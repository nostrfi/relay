services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: nostrfi/relay:latest
    container_name: nostrfi-relay
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist DuckDB across container restarts
      - relay-db:/app/db
      # Override config without rebuilding the image
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/ | grep -q '\"name\"'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  relay-db: