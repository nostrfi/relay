# GitVersion 6.x configuration for Nostrfi Relay
# https://gitversion.net/docs/reference/configuration
#
# Uses the built-in GitHubFlow/v1 workflow with overrides:
# - v-prefixed tags (v1.2.3)
# - main branch: ContinuousDeployment mode (every commit -> unique version)
# - Conventional commit +semver: messages for bump control

workflow: GitHubFlow/v1
tag-prefix: "[vV]"
commit-message-incrementing: Enabled
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'

branches:
  main:
    mode: ContinuousDeployment
    label: ""
    increment: Patch
