name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Version ────────────────────────────────────────────────────
  version:
    name: GitVersion
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      assemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}
      informationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}
      preReleaseTag: ${{ steps.gitversion.outputs.preReleaseTag }}
      isPrerelease: ${{ steps.gitversion.outputs.preReleaseTag != '' }}
      commitsSinceVersionSource: ${{ steps.gitversion.outputs.commitsSinceVersionSource }}
      sha: ${{ steps.gitversion.outputs.sha }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion-setup@v3
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion-execute@v3
        with:
          useConfigFile: true

      - name: Display version
        run: |
          echo "SemVer:               ${{ steps.gitversion.outputs.semVer }}"
          echo "MajorMinorPatch:      ${{ steps.gitversion.outputs.majorMinorPatch }}"
          echo "AssemblySemVer:       ${{ steps.gitversion.outputs.assemblySemVer }}"
          echo "InformationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}"
          echo "PreReleaseTag:        ${{ steps.gitversion.outputs.preReleaseTag }}"
          echo "PreReleaseTagWithDash: ${{ steps.gitversion.outputs.preReleaseTagWithDash }}"
          echo "CommitsSinceVersion:  ${{ steps.gitversion.outputs.commitsSinceVersionSource }}"
          echo "Sha:                  ${{ steps.gitversion.outputs.sha }}"

  # ── Build & test ──────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: version
    outputs:
      version: ${{ needs.version.outputs.semVer }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build (with version injection)
        env:
          CGO_ENABLED: 1
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ needs.version.outputs.semVer }}" \
            -o /tmp/relay ./cmd/relay

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./tests/...

      - name: Bump config.yaml version
        run: |
          VERSION="${{ needs.version.outputs.semVer }}"
          sed -i "s/^  version:.*/  version: \"$VERSION\"/" config.yaml
          echo "Bumped config.yaml version to $VERSION"
          grep version config.yaml

      - name: Upload coverage
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ needs.version.outputs.semVer }}
          path: coverage.out
          retention-days: 14

      - name: Upload config.yaml (version-bumped)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ needs.version.outputs.semVer }}
          path: config.yaml
          retention-days: 7

      # Docker metadata — uses GitVersion outputs for tagging
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Full semver: 1.2.3 or 1.2.3-alpha.1
            type=raw,value=${{ needs.version.outputs.semVer }}
            # Major.Minor: 1.2
            type=raw,value=${{ needs.version.outputs.majorMinorPatch }}
            # Major only: 1
            type=raw,value=${{ needs.version.outputs.majorMinorPatch }}
            # Git short SHA
            type=raw,value=sha-${{ needs.version.outputs.sha }}
            # latest only when not a prerelease
            type=raw,value=latest,enable=${{ needs.version.outputs.isPrerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=Nostrfi Relay
            org.opencontainers.image.description=A custom Nostr relay configured via YAML
            org.opencontainers.image.source=https://github.com/nostrfi/relay
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ needs.version.outputs.semVer }}

  # ── Docker build & push ───────────────────────────────────────
  package:
    name: Package & Publish
    runs-on: ubuntu-latest
    needs: [version, build]
    # Push to GHCR only on main or tag pushes — not PRs
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump config.yaml version
        run: |
          VERSION="${{ needs.version.outputs.semVer }}"
          sed -i "s/^  version:.*/  version: \"$VERSION\"/" config.yaml
          echo "Bumped config.yaml version to $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ needs.build.outputs.tags }}
          labels: ${{ needs.build.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.version.outputs.semVer }}

  # ── GitHub Release on tag ────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build, package]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binary (linux amd64)
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build \
            -ldflags="-s -w -X main.version=${{ needs.version.outputs.semVer }}" \
            -o dist/relay-linux-amd64 ./cmd/relay
          tar -czf dist/relay-linux-amd64.tar.gz -C dist relay-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.version.outputs.semVer }}
          generate_release_notes: true
          body: |
            ## Nostrfi Relay v${{ needs.version.outputs.semVer }}

            **Full version:** ${{ needs.version.outputs.informationalVersion }}
            **Commits since last version source:** ${{ needs.version.outputs.commitsSinceVersionSource }}

            ---
          files: dist/*.tar.gz
          draft: false
          prerelease: ${{ needs.version.outputs.isPrerelease == 'true' }}